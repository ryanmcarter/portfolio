<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Kraidle Design System</title>
  <desc id="desc">Gradle Technologies branded gradient artwork for the Kraidle Design System case study.</desc>
  <defs>
    <linearGradient id="base" x1="110" y1="482" x2="1150" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8f3fb"/>
      <stop offset="0.22" stop-color="#89bdfa"/>
      <stop offset="0.44" stop-color="#a847f4"/>
      <stop offset="0.64" stop-color="#e100a5"/>
      <stop offset="0.82" stop-color="#ff6f93"/>
      <stop offset="1" stop-color="#ffe3d5"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientTransform="matrix(520 0 0 360 528 100)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff5fe6" stop-opacity="0.95"/>
      <stop offset="0.52" stop-color="#d600ba" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#d600ba" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientTransform="matrix(480 0 0 310 330 396)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d4f6ff" stop-opacity="0.9"/>
      <stop offset="0.56" stop-color="#7db8ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7db8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="creamGlow" cx="0" cy="0" r="1" gradientTransform="matrix(360 0 0 280 1098 92)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe9dd" stop-opacity="0.95"/>
      <stop offset="0.62" stop-color="#ffc4b3" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffc4b3" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>
    <pattern id="grain" width="96" height="96" patternUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="transparent"/>
      <circle cx="12" cy="18" r="1" fill="#ffffff" opacity="0.13"/>
      <circle cx="44" cy="8" r="1" fill="#111827" opacity="0.08"/>
      <circle cx="80" cy="28" r="1" fill="#ffffff" opacity="0.1"/>
      <circle cx="28" cy="68" r="1" fill="#111827" opacity="0.07"/>
      <circle cx="72" cy="78" r="1" fill="#ffffff" opacity="0.11"/>
    </pattern>
  </defs>

  <rect width="1280" height="520" fill="url(#base)"/>
  <rect width="1280" height="520" fill="url(#pinkGlow)" filter="url(#soften)"/>
  <rect width="1280" height="520" fill="url(#blueGlow)" filter="url(#soften)"/>
  <rect width="1280" height="520" fill="url(#creamGlow)" filter="url(#soften)"/>
  <path d="M-80 56C176-28 336 86 480 166c174 96 330 102 492 34 128-54 246-44 388 10v378H-80V56Z" fill="#cf00b3" opacity="0.32" filter="url(#soften)"/>
  <path d="M-120 408c188-122 360-136 536-76 212 72 360 32 516-80 118-84 248-136 456-88v420H-120V408Z" fill="#dff7ff" opacity="0.44" filter="url(#soften)"/>
  <rect width="1280" height="520" fill="url(#grain)" opacity="0.55"/>

  <g transform="translate(540 76)">
    <path d="M24 0h24c18 0 34 15 34 34S66 68 48 68H24V48h24c7 0 13-6 13-14s-6-14-13-14H24V0Z" fill="#ffffff"/>
    <path d="M0 0h32v20H20v14h12v20H0V0Z" fill="#28c7bd"/>
    <path d="M16 20 32 34 16 48V20Z" fill="#e100a5"/>
    <text x="98" y="35" fill="#ffffff" font-family="Geist, ui-sans-serif, system-ui, sans-serif" font-size="43" font-weight="700" letter-spacing="-1">Gradle</text>
    <text x="101" y="58" fill="#ffffff" font-family="Geist Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" letter-spacing="6">TECHNOLOGIES</text>
  </g>

  <text x="640" y="292" fill="#ffffff" text-anchor="middle" font-family="Geist, ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="700" letter-spacing="-2">
    Kraidle Design System
  </text>
</svg>
